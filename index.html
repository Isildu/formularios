<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form novalidate>
        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" placeholder="hola" required> <br>

        <label for="password">Contraseña:</label>
        <input type="password" name="password"> <br>

        <label for="email">Email:</label>
        <input type="email" name="email"> <br>

        <label for="fecha">Fecha:</label>
        <input type="date" name="fecha"> <br>

        <label for="edad">Edad:</label>
        <input type="number" name="edad"> <br>
        <input type="text" minlength="3" maxlength="10">
        

        <input type="radio" name="genero" value="masculino"> Masculino
        <input type="radio" name="genero" value="femenino"> Femenino
        <input type="radio" name="genero" value="otro"> Otro <br>

        <input type="checkbox" name="intereses" value="js"> JavaScript
        <input type="checkbox" name="intereses" value="python"> Python <br>

        <label for="mensaje">Mensaje:</label> <br>

        <select name="pais" id="pais">
            <option value="mx">México</option>
            <option value="es">España</option>
            <option value="co">Colombia</option>
        </select>

        <textarea name="mensaje" id="mensaje"></textarea>
        <input type="submit" value="Enviar">
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
    </form>
</body>

</html>
